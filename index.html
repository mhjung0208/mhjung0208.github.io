<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minjung Portfolio</title>
  <style>
    :root {
      --bg-1: #f8fafc;
      --bg-2: #eef2f7;
      --card: rgba(255, 255, 255, 0.92);
      --text: #1f2933;
      --sub: #52606d;
      --point: #1f6feb;
      --line: rgba(15, 23, 42, 0.08);
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 10%, #ffffff 0%, transparent 38%),
        radial-gradient(circle at 88% 12%, #e9f2ff 0%, transparent 32%),
        linear-gradient(165deg, var(--bg-1), var(--bg-2));
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -120px auto auto -120px;
      width: 320px;
      height: 320px;
      background: rgba(66, 153, 225, 0.14);
      filter: blur(70px);
      border-radius: 50%;
      z-index: -1;
    }

    .wrap {
      width: min(960px, 92vw);
      margin: 0 auto;
      padding: 44px 0 84px;
    }

    section {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 26px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    section:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.1);
    }

    h1, h2, h3 { margin: 0 0 12px; }

    h1 {
      font-size: clamp(1.7rem, 2.6vw, 2.2rem);
      letter-spacing: -0.02em;
    }

    h2 {
      font-size: 1.25rem;
      color: var(--point);
      letter-spacing: -0.01em;
    }

    p { margin: 0 0 8px; color: var(--sub); }

    .about {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 20px;
      align-items: start;
    }

    .photo-box,
    .photo {
      width: 120px;
      height: 150px;
      border-radius: 8px;
    }

    .photo-box {
      border: 1px dashed #9ca3af;
      display: grid;
      place-items: center;
      color: #6b7280;
      font-size: 0.85rem;
      background: #f9fafb;
    }

    .photo {
      object-fit: cover;
      border: 1px solid #e5e7eb;
      display: none;
    }

    .info { margin: 0; padding: 0; list-style: none; }

    .info li {
      padding: 6px 0;
      border-bottom: 1px solid #f3f4f6;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .chips li {
      background: #f4f8ff;
      border: 1px solid #d3e2ff;
      color: #2f4f8f;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.9rem;
    }

    .career { list-style: none; margin: 0; padding: 0; }

    .career li {
      border-left: 3px solid #dbeafe;
      padding: 8px 0 8px 12px;
      margin-bottom: 8px;
    }

    .career h3 {
      margin-bottom: 4px;
      font-size: 1rem;
      color: #1e3a8a;
    }

    .projects { list-style: none; margin: 0; padding: 0; }

    .projects li {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
      background: #fcfdff;
    }

    .project-name {
      margin: 0 0 4px;
      font-weight: 700;
      color: var(--text);
    }

    .project-summary {
      margin: 0;
      color: var(--sub);
      font-size: 0.95rem;
    }

    .error {
      color: #b91c1c;
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      .about { grid-template-columns: 1fr; }
      .photo-box, .photo { width: 100%; max-width: 180px; }
      section { padding: 20px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section>
      <h1 id="title-main">Loading...</h1>
      <p id="title-sub"></p>
    </section>

    <section>
      <h2>About Me</h2>
      <div class="about">
        <div id="photo-box" class="photo-box">증명사진</div>
        <img id="about-photo" class="photo" alt="증명사진" />
        <ul id="about-info" class="info"></ul>
      </div>
    </section>

    <section>
      <h2>Introduce</h2>
      <p id="introduce-text"></p>
    </section>

    <section>
      <h2>Career</h2>
      <ul id="career-list" class="career"></ul>
    </section>

    <section>
      <h2>Stacks</h2>
      <ul id="stacks-list" class="chips"></ul>
    </section>

    <section>
      <h2>Work Tools</h2>
      <ul id="tools-list" class="chips"></ul>
    </section>

    <section>
      <h2>Projects</h2>
      <ul id="projects" class="projects"></ul>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
