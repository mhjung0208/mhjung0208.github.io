<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이력서</title>
  <meta name="description" content="">
  <meta property="og:title" content="">
  <meta property="og:description" content="">
  <meta property="og:type" content="website">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <meta name="theme-color" content="#e8604c">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👨‍💻</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: { DEFAULT: '#e8604c', light: '#ee7e6d', dark: '#d4503e' },
            warm: { 50: '#faf7f2', 100: '#f3ede4', 200: '#e8dfd3' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-warm-50 text-gray-700">

  <!-- 네비게이션 -->
  <nav id="navbar" class="fixed top-0 w-full bg-warm-50/80 backdrop-blur-md z-50 border-b border-warm-200/50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="#hero" id="nav-logo" class="text-xl font-bold text-accent flex items-center gap-2">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          <span></span>
        </a>

        <!-- 데스크톱 메뉴 -->
        <div class="hidden md:flex items-center space-x-6">
          <a href="#hero" class="nav-link text-sm text-gray-500 hover:text-accent transition-colors">Home</a>
          <a href="#about" class="nav-link text-sm text-gray-500 hover:text-accent transition-colors">About</a>
          <a href="#experience" class="nav-link text-sm text-gray-500 hover:text-accent transition-colors">Experience</a>
          <a href="#skills" class="nav-link text-sm text-gray-500 hover:text-accent transition-colors">Skills</a>
          <a href="#projects" class="nav-link text-sm text-gray-500 hover:text-accent transition-colors">Projects</a>
          <a href="#education" class="nav-link text-sm text-gray-500 hover:text-accent transition-colors">Education</a>
          <a href="#contact" class="nav-link text-sm text-gray-500 hover:text-accent transition-colors">Contact</a>
        </div>

        <!-- 모바일 메뉴 버튼 -->
        <button id="menu-toggle" class="md:hidden p-2 rounded-md text-gray-500 hover:text-accent transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path id="menu-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>

      <!-- 모바일 메뉴 -->
      <div id="mobile-menu" class="hidden md:hidden pb-4 border-t border-warm-200/50">
        <a href="#hero" class="mobile-nav-link block py-2.5 text-gray-600 hover:text-accent transition-colors">Home</a>
        <a href="#about" class="mobile-nav-link block py-2.5 text-gray-600 hover:text-accent transition-colors">About</a>
        <a href="#experience" class="mobile-nav-link block py-2.5 text-gray-600 hover:text-accent transition-colors">Experience</a>
        <a href="#skills" class="mobile-nav-link block py-2.5 text-gray-600 hover:text-accent transition-colors">Skills</a>
        <a href="#projects" class="mobile-nav-link block py-2.5 text-gray-600 hover:text-accent transition-colors">Projects</a>
        <a href="#education" class="mobile-nav-link block py-2.5 text-gray-600 hover:text-accent transition-colors">Education</a>
        <a href="#contact" class="mobile-nav-link block py-2.5 text-gray-600 hover:text-accent transition-colors">Contact</a>
      </div>
    </div>
  </nav>

  <!-- Hero 섹션 -->
  <section id="hero" class="pt-80 pb-[17rem] flex items-center relative overflow-visible">
    <div class="hero-grid-bg absolute inset-0"></div>
    <div id="hero-content" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full relative z-10"></div>
  </section>

  <!-- About Me 섹션 -->
  <section id="about" class="py-20 bg-white fade-in">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-3xl font-bold text-gray-900 mb-12 text-center">About <span class="text-accent">Me</span></h2>
      <div id="about-content"></div>
    </div>
  </section>

  <!-- Experience 섹션 -->
  <section id="experience" class="py-20 fade-in">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-3xl font-bold text-gray-900 mb-12 text-center">Work <span class="text-accent">Experience</span></h2>
      <div id="experience-content"></div>
    </div>
  </section>

  <!-- Skills 섹션 -->
  <section id="skills" class="py-20 bg-white fade-in">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-3xl font-bold text-gray-900 mb-12 text-center">My <span class="text-accent">Skills</span></h2>
      <div id="skills-content"></div>
    </div>
  </section>

  <!-- Projects 섹션 -->
  <section id="projects" class="py-20 fade-in">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-3xl font-bold text-gray-900 mb-12 text-center">My <span class="text-accent">Projects</span></h2>
      <div id="projects-content"></div>
    </div>
  </section>

  <!-- Education 섹션 -->
  <section id="education" class="py-20 bg-white fade-in">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-3xl font-bold text-gray-900 mb-12 text-center">My <span class="text-accent">Education</span></h2>
      <div id="education-content"></div>
    </div>
  </section>

  <!-- Contact 섹션 -->
  <section id="contact" class="py-20 fade-in">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-3xl font-bold text-gray-900 mb-12 text-center">Contact <span class="text-accent">Me</span></h2>
      <div id="contact-content"></div>
    </div>
  </section>

  <!-- 푸터 -->
  <footer class="py-8 border-t border-warm-200/50 text-center text-sm text-gray-400">
    <p id="footer-text"></p>
  </footer>

  <!-- 스크롤 상단 이동 버튼 -->
  <button id="scroll-top" class="fixed bottom-6 right-6 w-12 h-12 bg-accent text-white rounded-full shadow-lg shadow-accent/25 hover:bg-accent-light transition-colors flex items-center justify-center z-40" aria-label="맨 위로 이동">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/>
    </svg>
  </button>

  <!-- 프로젝트 상세 모달 -->
  <div id="project-modal"></div>

  <script src="js/main.js"></script>
</body>
</html>
