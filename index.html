<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이력서</title>
  <meta name="description" content="">
  <meta property="og:title" content="">
  <meta property="og:description" content="">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👨‍💻</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 text-slate-800">

  <!-- 네비게이션 -->
  <nav id="navbar" class="fixed top-0 w-full bg-white/90 backdrop-blur-sm shadow-sm z-50 transition-shadow duration-300">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="#hero" id="nav-logo" class="text-xl font-bold text-blue-600"></a>

        <!-- 데스크톱 메뉴 -->
        <div class="hidden md:flex space-x-8">
          <a href="#about" class="nav-link text-slate-600 hover:text-blue-600 transition-colors">About</a>
          <a href="#skills" class="nav-link text-slate-600 hover:text-blue-600 transition-colors">Skills</a>
          <a href="#experience" class="nav-link text-slate-600 hover:text-blue-600 transition-colors">Experience</a>
          <a href="#projects" class="nav-link text-slate-600 hover:text-blue-600 transition-colors">Projects</a>
          <a href="#education" class="nav-link text-slate-600 hover:text-blue-600 transition-colors">Education</a>
          <a href="#contact" class="nav-link text-slate-600 hover:text-blue-600 transition-colors">Contact</a>
        </div>

        <!-- 모바일 메뉴 버튼 -->
        <button id="menu-toggle" class="md:hidden p-2 rounded-md text-slate-600 hover:text-blue-600 hover:bg-slate-100 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path id="menu-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>

      <!-- 모바일 메뉴 -->
      <div id="mobile-menu" class="hidden md:hidden pb-4">
        <a href="#about" class="mobile-nav-link block py-2 text-slate-600 hover:text-blue-600 transition-colors">About</a>
        <a href="#skills" class="mobile-nav-link block py-2 text-slate-600 hover:text-blue-600 transition-colors">Skills</a>
        <a href="#experience" class="mobile-nav-link block py-2 text-slate-600 hover:text-blue-600 transition-colors">Experience</a>
        <a href="#projects" class="mobile-nav-link block py-2 text-slate-600 hover:text-blue-600 transition-colors">Projects</a>
        <a href="#education" class="mobile-nav-link block py-2 text-slate-600 hover:text-blue-600 transition-colors">Education</a>
        <a href="#contact" class="mobile-nav-link block py-2 text-slate-600 hover:text-blue-600 transition-colors">Contact</a>
      </div>
    </div>
  </nav>

  <!-- Hero 섹션 -->
  <section id="hero" class="min-h-screen flex items-center justify-center pt-16">
    <div id="hero-content" class="text-center px-4"></div>
  </section>

  <!-- About Me 섹션 -->
  <section id="about" class="py-20 bg-white">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-3xl font-bold text-slate-900 mb-12 text-center">About Me</h2>
      <div id="about-content"></div>
    </div>
  </section>

  <!-- Skills 섹션 -->
  <section id="skills" class="py-20">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-3xl font-bold text-slate-900 mb-12 text-center">Skills</h2>
      <div id="skills-content"></div>
    </div>
  </section>

  <!-- Experience 섹션 -->
  <section id="experience" class="py-20 bg-white">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-3xl font-bold text-slate-900 mb-12 text-center">Experience</h2>
      <div id="experience-content"></div>
    </div>
  </section>

  <!-- Projects 섹션 -->
  <section id="projects" class="py-20">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-3xl font-bold text-slate-900 mb-12 text-center">Projects</h2>
      <div id="projects-content"></div>
    </div>
  </section>

  <!-- Education 섹션 -->
  <section id="education" class="py-20 bg-white">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-3xl font-bold text-slate-900 mb-12 text-center">Education</h2>
      <div id="education-content"></div>
    </div>
  </section>

  <!-- Contact 섹션 -->
  <section id="contact" class="py-20">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-3xl font-bold text-slate-900 mb-12 text-center">Contact</h2>
      <div id="contact-content"></div>
    </div>
  </section>

  <!-- 푸터 -->
  <footer class="py-8 bg-slate-900 text-slate-400 text-center text-sm">
    <p id="footer-text"></p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
